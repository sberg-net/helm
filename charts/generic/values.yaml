nameOverride: ""
fullnameOverride: ""

## use private registry
privateRegistry:
  enabled: false
  #name: ask-sberg
  #imagePullSecret:
  #  name: sberg-registry-pull-secret
  #  username: ask-sberg
  #  token: ask-sberg

## ingress config based on ingress-class nginx & cert manager Let's Encrypt
ingress:
  enabled: false
  annotations: {}
  #  kubernetes.io/ingress.class: nginx,
  #  cert-manager.io/cluster-issuer: letsencrypt-production,
  #  kubernetes.io/tls-acme: 'true',
  #  nginx.ingress.kubernetes.io/proxy-body-size: 1000m
  labels: {}
  path: /
  pathType: Prefix
  hostname: app.your-domain.com
  #tls:
  #  - secretName: eldix-tls
  #    hosts:
  #     - eldix.domain.de

app:
  image:
    ## full path and name of eldix image (e.g., repository/eldix-image)
    ## default: values from privateRegistry
    #repository:
    ## default: version from chart.yaml
    #version:
    pullPolicy: Always
  securityContext: {}
    #runAsUser: 2727
    #runAsGroup: 2727
    #fsGroup: 2727
  nodeSelector: {}
  ## dynamic app parameter, (e.g., logging parameter for spring)
  environment:
    #- name: LOGGER_LEVEL_NET_SBERG
    #  value: debug

  service:
    web:
      port: 80
      type: ClusterIP

  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

  persistence:
    enabled: false
    ## If true will use an existing PVC instead of creating one
    #useExistingPVC:
    ## use default storageClass with ""
    ## disable auto storageClass with "-"
    storageClass: ""
    size: 30Gi

  ## volume mounts for app will be used if persistence.enabled is true
  volumeMounts:
    - mountPath: /tmp
    #  subPath: tmp
    #- mountPath: elbook-data
    #  subPath: app

  livenessProbe:
    enabled: true
    initialDelaySeconds: 10
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
  startupProbe:
    enabled: false
    initialDelaySeconds: 30

## use mariadb enable this and disable externalDatabase
mariadb:
  enabled: false
  auth:
    database:
    username:
    password:
  primary:
    persistence:
      enabled: false
      ## use default with ""
      storageClass: ""
      size: 5Gi
